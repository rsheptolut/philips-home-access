name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "30 4 * * *"

jobs:
  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # The integration isn't in home-assistant/brands yet (optional; see README).
          ignore: brands
